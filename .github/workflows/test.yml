name: Test Workflow

on: [push]

jobs:
  my_first_job:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./bootstrap

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Passage en v4

      - name: Setup node
        uses: actions/setup-node@v4 # Passage en v4
        with:
          node-version: 20
          # Supprime temporairement les lignes cache pour "nettoyer" le serveur
          
      - name: Install
        # On utilise install pour forcer une réinstallation propre
        run: npm install 
        working-directory: ./bootstrap

      - name : echo & liste des fichiers
        run: |
          echo "Hello Github Actions"
          git ls-files

      - name: Linter (Qualité du code)
        run: npm run eslint:check

      - name: Tests Unitaires (Logique mathématique)
        run: npm run mocha:test

      - name: Couverture de code
        run: npm run nyc:run







